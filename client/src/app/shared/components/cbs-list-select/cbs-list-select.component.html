<div class="slds-form-element">
    <label class="slds-form-element__label">
        <abbr *ngIf="isRequired" class="slds-required" title="required">*</abbr>
        {{ listLabel | translate}}
    </label>

    <div class="slds-form-element__control cbs-entry-fees">
        <div class="slds-text-align--center" *ngIf="!listData?.length">{{ noDataLabel | translate}}</div>
        <ul>
            <li *ngFor="let item of listData">{{item?.name}}
                <button (click)="delete(item)" *ngIf="displayButton">
                    <svg class="slds-button__icon" aria-hidden="true">
                        <use xlink:href="assets/icons/utility-sprite/svg/symbols.svg#close"></use>
                    </svg>
                    <span class="slds-assistive-text">{{'DELETE' | translate}}</span>
                </button>
            </li>
        </ul>
    </div>
</div>

<select [(ngModel)]="pick" (ngModelChange)="selectItem($event)" [disabled]="!picklistData?.length" class="slds-select">
    <option [ngValue]="null" disabled selected>{{ selectDataLabel | translate }}</option>
    <option *ngFor="let item of picklistData" [ngValue]="item">{{ item?.name }}</option>
</select>
